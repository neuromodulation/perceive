# This is a basic workflow to help you get started with Actions

name: buildfile perceive

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events
  push:
    paths-ignore:
      #- 'README.MD'
      #- '.github/workflows/**'
      - 'reports/**'
  pull_request:



  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  test:
    name: test on ${{ matrix.MATLABVersion }}
    strategy:
      fail-fast: false
      matrix:
        MATLABVersion: [R2024b, R2025a, R2026a]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repo
        uses: actions/checkout@v4
      
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.MATLABVersion }}
          products: Statistics_and_Machine_Learning_Toolbox
      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: addpath("buildUtilities"),testToolbox('ReportSubdirectory',"${{ matrix.MATLABVersion }}",'Fast',true)
          
      # Check for MATLAB code issues in the project.
      #- name: Check for MATLAB code issues
      #  uses: matlab-actions/run-command@v2
      #  if: always()
      #  with:
      #    command: addpath("buildUtilities"),codecheckToolbox()     

      # Runs all tests in the project.
      #- name: Run tests
      #  uses: matlab-actions/run-command@v2
      #  if: always()
      #  with:
      #    command: addpath("buildUtilities"),testToolbox()     

      - name: Upload code coverage report to Codecov (https://app.codecov.io/gh/neuromodulation/perceive)
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: reports/${{ matrix.MATLABVersion }}/codecoverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: neuromodulation/perceive
          env_vars: ${{ matrix.MATLABVersion }}
          fail_ci_if_error: false
          
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          junit_files: "reports/${{ matrix.MATLABVersion }}/test-results.xml"
          
     # Save the contents of the reports directory as an artifact
      - name: Save Reports Directory
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ matrix.MATLABVersion }}
          path: reports/${{ matrix.MATLABVersion }}