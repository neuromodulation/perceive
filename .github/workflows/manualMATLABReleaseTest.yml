name: Manually run tests against MATLAB Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-release-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  test:
    name: Test MATLAB Releases
    strategy:
        fail-fast: true
        matrix:
          MATLABVersion: [R2024b, R2025a, R2026a]
    # The type of runner that the job will run on    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    timeout-minutes: 25
  
      # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repo
        uses: actions/checkout@v4
      
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.MATLABVersion }}

      # Runs all tests in the project.  Put results in a version specific subdirectory
      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: addpath("buildUtilities"),testToolbox('ReportSubdirectory',"${{ matrix.MATLABVersion }}",'Fast',true)
